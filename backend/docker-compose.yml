services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SSLMODE=${DB_SSLMODE:-}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Code-execution engine (Piston). Swappable: point elsewhere to move it off-box.
      - PISTON_URL=${PISTON_URL:-http://piston:2000}
      - CODING_ENABLED=${CODING_ENABLED:-True}
      # Storage backend selector: azure | s3 | local
      - STORAGE_BACKEND=${STORAGE_BACKEND:-}
      # Azure Blob Storage
      - AZURE_ACCOUNT_NAME=${AZURE_ACCOUNT_NAME:-}
      - AZURE_ACCOUNT_KEY=${AZURE_ACCOUNT_KEY:-}
      - AZURE_CONTAINER=${AZURE_CONTAINER:-media}
      # AWS S3 (legacy)
      - USE_S3=${USE_S3:-False}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-ap-south-1}

    depends_on:
      db:
        condition: service_healthy

  # Code-execution sandbox for coding questions. Runs untrusted student code.
  # SECURITY: never publish ports (internal docker network only); reachable only
  # from `web` at http://piston:2000. Requires privileged for Isolate sandbox;
  # walled off with strict cpu/memory/pids caps so it cannot starve the app.
  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    restart: unless-stopped
    volumes:
      - piston_data:/piston
    # No `ports:` on purpose â€” do NOT expose to host/internet.
    cpus: "1.0"
    mem_limit: 1536m
    mem_reservation: 256m
    pids_limit: 1024

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
  piston_data:
