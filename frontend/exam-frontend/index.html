<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />

    <!--
      The social-meta block below (between the start/end markers) is rewritten at
      build time by scripts/inject-meta.mjs using the tenant's branding (fetched
      from /api/v1/tenant/VITE_TENANT_ID/), so link previews on
      WhatsApp/Facebook/Twitter reflect the tenant instead of these defaults.
      Crawlers don't run JS, so this must happen at build time, not at runtime.
    -->
    <!-- social-meta:start -->
    <title>DailyTaiyari - Ace Your Exams</title>
    <meta name="description" content="India's Premier Exam Preparation Platform for NEET and IIT JEE" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DailyTaiyari" />
    <meta property="og:title" content="DailyTaiyari - Ace Your Exams" />
    <meta property="og:description" content="India's Premier Exam Preparation Platform for NEET and IIT JEE" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DailyTaiyari - Ace Your Exams" />
    <meta name="twitter:description" content="India's Premier Exam Preparation Platform for NEET and IIT JEE" />
    <!-- social-meta:end -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
